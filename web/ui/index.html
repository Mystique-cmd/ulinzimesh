<head>
  <meta charset="UTF-8" />
  <meta name="description"
    content="UlinziMesh is a modular cybersecurity framework for orchestrating low-level agents, adaptive dashboards, and real-time threat response workflows.">
  <meta name="keywords"
    content="UlinziMesh, cybersecurity framework, agent orchestration, OSINT, threat hunting, assembler agent, binary triggers, API hooks, dashboard integration, modular security, low-level programming, incident response, digital footprint analysis, ethical hacking, systems architecture, workflow automation, recon workflows, security mesh, cross-language integration, adaptive defense, telemetry pipelines, real-time monitoring, secure build pipelines, threat intelligence, security automation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UlinziMesh Dashboard</title>
  <link rel="stylesheet" href="styles.css" type="text/css">
  <link rel="icon" href="admin.png" type="image/x-icon"> 
  <link rel="alternate" href="#">

<body>
  <header>
    <h1>UlinziMesh</h1>
    <p class="subtitle">Threat Hunting & Deception Telemetry</p>
  </header>

  <main>
    <section>
      <h2>Recent Findings</h2>
      <table id="findings">
        <thead>
          <tr>
            <th>Title</th>
            <th>Severity</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Recent Network Flows</h2>
      <table id="flows">
        <thead>
          <tr>
            <th>Host</th>
            <th>Src IP</th>
            <th>Dst IP</th>
            <th>Dst Port</th>
            <th>Protocol</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Indicators</h2>
      <table id="indicators">
        <thead>
          <tr>
            <th>Type</th>
            <th>Value</th>
            <th>Confidence</th>
            <th>Last Seen</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>UlinziMesh v0.1 — Built for adaptive threat response</p>
  </footer>

  <script src="app.js"></script>
